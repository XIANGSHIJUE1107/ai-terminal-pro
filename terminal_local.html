<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI智能投研分析平台 | 离线版</title>
<script src="stock_data.js"></script>
<style>
:root{--bg:#071018;--bg2:#0d1723;--bg3:#111c2b;--bd:#1a2738;--tx:#d6deea;--tx2:#7e90a8;--ac:#ff6a00;--up:#ff274d;--dn:#00c853;--bl:#2d7dff;--r:6px;--fm:'Consolas','JetBrains Mono',monospace;--fs:'Microsoft YaHei','Noto Sans SC',sans-serif}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#08111a,#05090d);color:var(--tx);font-family:var(--fs);min-height:100vh}
.top{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(13,23,35,.9);border-bottom:1px solid var(--bd);position:sticky;top:0;backdrop-filter:blur(12px);z-index:5}
.brand{font-family:var(--fm);font-weight:700;color:var(--ac);letter-spacing:.5px}
.pill{font-family:var(--fm);font-size:12px;color:var(--tx2)}
.wrap{padding:12px;display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.card{background:rgba(13,23,35,.96);border:1px solid var(--bd);border-radius:var(--r);padding:10px}
.card h3{margin:0 0 8px;font-size:13px;color:var(--tx2);font-family:var(--fm)}
.row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(26,39,56,.5);font-size:13px}
.row:last-child{border-bottom:0}
.name{color:var(--tx)}
.val{font-family:var(--fm);font-weight:700}
.up{color:var(--up)}.down{color:var(--dn)}.flat{color:var(--tx2)}
.table{width:100%;border-collapse:collapse;font-size:13px}
.table th,.table td{padding:6px 4px;border-bottom:1px solid rgba(26,39,56,.5);text-align:left;white-space:nowrap}
.table th{color:var(--tx2);font-weight:600;font-size:11px}
.hint{color:var(--tx2);font-size:12px;line-height:1.6}
</style>
</head>
<body>
<div class="top">
  <div class="brand">AI TERMINAL PRO</div>
  <div class="pill">离线本地快照</div>
  <div class="pill" id="stamp"></div>
</div>

<div class="wrap">
  <div class="card">
    <h3>核心持仓</h3>
    <table class="table">
      <thead><tr><th>股票</th><th>现价</th><th>涨跌幅</th></tr></thead>
      <tbody id="hold-body"></tbody>
    </table>
  </div>
  <div class="card">
    <h3>市场概览</h3>
    <div id="market-box"></div>
  </div>
  <div class="card">
    <h3>说明</h3>
    <div class="hint">
      这个页面不依赖后端，不拉接口，适合直接双击打开。<br>
      数据来自当前目录里的 `stock_data.js` 快照。
    </div>
  </div>
</div>

<script>
const PORTFOLIO=[['亨通光电','sh600487'],['立讯精密','sz002475'],['东山精密','sz002384'],['华工科技','sz000988'],['贵研铂业','sh600459'],['晋拓股份','sh603211'],['有研新材','sh600206'],['风华高科','sz000636']];
const INDEXS=[['上证指数','sh000001'],['深证成指','sz399001'],['创业板指','sz399006'],['沪深300','sh000300'],['科创50','sh000688'],['中证1000','sh000852']];
const SNAPSHOT=typeof STOCK_DATA!=='undefined'?STOCK_DATA:{};
const byCode={};
for(const [code,val] of Object.entries(SNAPSHOT)){
  const sym=code.endsWith('.SZ')?'sz'+code.slice(0,6):code.endsWith('.SH')?'sh'+code.slice(0,6):null;
  if(!sym)continue;
  byCode[sym]={
    name:val['简称']||code,
    current:Number(val['现价']||0),
    change:Number(val['涨跌幅']||0),
    prevClose:Number(val['前收']||0),
    open:Number(val['今开']||0),
    high:Number(val['最高']||0),
    low:Number(val['最低']||0),
    amount:Number(val['成交额']||0),
  };
}
document.getElementById('stamp').textContent=new Date().toLocaleString('zh-CN',{hour12:false});
document.getElementById('hold-body').innerHTML=PORTFOLIO.map(([name,sym])=>{
  const d=byCode[sym]||{};
  const cls=d.change>0?'up':d.change<0?'down':'flat';
  return `<tr><td>${name}</td><td class="val">${d.current?d.current.toFixed(2):'--'}</td><td class="val ${cls}">${d.change>=0?'+':''}${d.change?d.change.toFixed(2):'0.00'}%</td></tr>`;
}).join('');
document.getElementById('market-box').innerHTML=INDEXS.map(([name,sym])=>{
  const d=byCode[sym]||{};
  const cls=d.change>0?'up':d.change<0?'down':'flat';
  return `<div class="row"><span class="name">${name}</span><span class="val">${d.current?d.current.toFixed(2):'--'} <span class="${cls}">${d.change>=0?'+':''}${d.change?d.change.toFixed(2):'0.00'}%</span></span></div>`;
}).join('');
</script>
</body>
</html>
