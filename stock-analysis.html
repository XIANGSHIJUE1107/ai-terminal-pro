.card-bd0{padding:0}
.up{color:var(--up)}.down{color:var(--dn)}.flat{color:var(--tx2)}

.tab{padding:7px 14px;font-size:12px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tr);background:none;border-top:none;border-left:none;border-right:none;font-family:var(--fs);white-space:nowrap;display:inline-flex;align-items:center;gap:2px}

.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.fin-card .fs{font-size:11px;color:var(--tx3);margin-top:3px}

.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--fs)}

.score-card{background:var(--bg);border-radius:var(--r);padding:6px 8px;text-align:center}
.score-card .sc{font-family:var(--fm);font-size:17px;font-weight:700}

.tech-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.tech-item{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px}

.drawdown-bar-wrap{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0}

.ops-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px}
.ops-table th{background:var(--bg2);color:var(--tx3);padding:6px 10px;text-align:left;font-size:11px;border-bottom:1px solid var(--bd)}

.ops-empty{text-align:center;color:var(--tx3);padding:16px;font-size:12px}
.ops-form{display:none;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:8px}

.ops-form .form-row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;margin-bottom:6px}

.pred-btn{padding:5px 16px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);border-radius:var(--r);font-size:12px;cursor:pointer;transition:all var(--tr);font-family:var(--fs)}

// ============================================================
// 技术指标计算函数
// ============================================================
function calcMA(d, p) {
  var r = [];
  for (var i = 0; i < d.length; i++) {
    if (i < p - 1) { r.push(null); continue; }
    var s = 0;
    for (var j = i - p + 1; j <= i; j++) s += d[j].close;
    r.push(s / p);
  }
  return r;
}
function calcEMA(d, p) {
  var r = [], k = 2 / (p + 1), e = d[0].close;
  r.push(e);
  for (var i = 1; i < d.length; i++) { e = d[i].close * k + e * (1 - k); r.push(e); }
  return r;
}
function calcMACD(d, f, s, sig) {
  f = f || 12; s = s || 26; sig = sig || 9;
  var ef = calcEMA(d, f), es = calcEMA(d, s);
  var dif = ef.map(function(v, i) { return (v != null && es[i] != null) ? v - es[i] : null; });
  var dea = [], macd = [], dv = null;
  for (var i = 0; i < dif.length; i++) {
    if (dif[i] == null) { dea.push(null); macd.push(null); continue; }
    if (dv == null) dv = dif[i];
    else dv = dv * ((sig - 1) / (sig + 1)) + dif[i] * (2 / (sig + 1));
    dea.push(dv); macd.push((dif[i] - dv) * 2);
  }
  return { dif: dif, dea: dea, macd: macd };
}
function calcRSI(d, p) {
  p = p || 14;
  var r = [], ag = 0, al = 0;
  for (var i = 0; i < d.length; i++) {
    if (i === 0) { r.push(null); continue; }
    var diff = d[i].close - d[i - 1].close;
    var g = diff > 0 ? diff : 0, l = diff < 0 ? -diff : 0;
    if (i < p) { ag += g; al += l; if (i < p - 1) { r.push(null); continue; } ag /= p; al /= p; }
    else { ag = (ag * (p - 1) + g) / p; al = (al * (p - 1) + l) / p; }
    var rs = al === 0 ? 100 : ag / al;
    r.push(100 - (100 / (1 + rs)));
  }
  return r;
}
function calcBOLL(d, p, m) {
  p = p || 20; m = m || 2;
  var mid = calcMA(d, p), u = [], lo = [], w = [];
  for (var i = 0; i < d.length; i++) {
    if (mid[i] == null) { u.push(null); lo.push(null); w.push(null); continue; }
    var sq = 0;
    for (var j = i - p + 1; j <= i; j++) sq += Math.pow(d[j].close - mid[i], 2);
    var std = Math.sqrt(sq / p);
    u.push(mid[i] + m * std); lo.push(mid[i] - m * std); w.push(u[i] - lo[i]);
  }
  return { mid: mid, upper: u, lower: lo, width: w };
}
function calcKDJ(d, p) {
  p = p || 9;
  var k = [], d2 = [], j = [], kv = 50, dv = 50;
  for (var i = 0; i < d.length; i++) {
    if (i < p - 1) { k.push(null); d2.push(null); j.push(null); continue; }
    var h = d[i].high, lo = d[i].low;
    for (var t = i - p + 1; t <= i; t++) { if (d[t].high > h) h = d[t].high; if (d[t].low < lo) lo = d[t].low; }
    var rsv = lo === h ? 50 : ((d[i].close - lo) / (h - lo)) * 100;
    kv = kv * 2 / 3 + rsv * 1 / 3; dv = dv * 2 / 3 + kv * 1 / 3;
    k.push(kv); d2.push(dv); j.push(3 * kv - 2 * dv);
  }
  return { k: k, d: d2, j: j };
}
function calcAll(d) {
  return {
    ma5: calcMA(d, 5), ma10: calcMA(d, 10), ma20: calcMA(d, 20), ma60: calcMA(d, 60),
    macd: calcMACD(d), rsi: calcRSI(d), boll: calcBOLL(d), kdj: calcKDJ(d)
  };
}

// ============================================================
// K线数据获取
// ============================================================
function fetchKline(symbol, scale, len) {
  scale = scale || 240; len = len || 60;
  var url = 'https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=' + symbol + '&scale=' + scale + '&datalen=' + len;
  var pu = '/api/proxy?url=' + encodeURIComponent(url);
  return fetch(pu).then(function(resp) { return resp.json(); }).then(function(data) {
    return data.map(function(d) {
      return { date: d.day, open: +d.open, close: +d.close, high: +d.high, low: +d.low, volume: +d.volume };
    });
  }).catch(function() {
    // 离线降级：生成模拟K线数据用于技术指标计算
    return generateFallbackKline(symbol, len);
  });
}

// 离线降级：生成模拟K线数据
function generateFallbackKline(symbol, len) {
  var code = symbol.replace('sz','').replace('sh','');
  var d = STOCK_DATA[code+'.SZ'] || STOCK_DATA[code+'.SH'] || {};
  var basePrice = d['现价'] || 50;
  var volatility = 0.02;
  var data = [];
  var now = new Date();
  var price = basePrice * (1 - Math.random() * 0.1);
  for (var i = len - 1; i >= 0; i--) {
    var date = new Date(now);
    date.setDate(date.getDate() - i);
    var change = (Math.random() - 0.48) * volatility * price;
    var open = price;
    var close = price + change;
    var high = Math.max(open, close) * (1 + Math.random() * 0.01);
    var low = Math.min(open, close) * (1 - Math.random() * 0.01);
    var volume = Math.floor(5000000 + Math.random() * 15000000);
    data.push({
      date: date.toISOString().slice(0, 10),
      open: +open.toFixed(2),
      close: +close.toFixed(2),
      high: +high.toFixed(2),
      low: +low.toFixed(2),
      volume: volume
    });
    price = close;
  }
  return data;
}

function getRecords(code) {
  try { var v = localStorage.getItem('sa_records_' + code); return v ? JSON.parse(v) : []; } catch (e) { return []; }
}
function saveRecords(code, records) {
  try { localStorage.setItem('sa_records_' + code, JSON.stringify(records)); } catch (e) {}
}
function addRecord(code, record) {
  var records = getRecords(code);
  record.id = Date.now();
  record.createdAt = new Date().toISOString();
  records.unshift(record);
  saveRecords(code, records);
  return records;
}
function deleteRecord(code, id) {
  var records = getRecords(code);
  records = records.filter(function(r) { return r.id !== id; });
  saveRecords(code, records);
  return records;
}

  else if (f.pe < 30) scores.push({ l: '估值', s: 65, c: 'var(--cy)', t: 'PE合理区间' });
  else if (f.pe < 50) scores.push({ l: '估值', s: 40, c: 'var(--ye)', t: 'PE偏高，注意估值风险' });
  else scores.push({ l: '估值', s: 20, c: 'var(--up)', t: 'PE过高' });

  if (f.revenueGrowth > 0.2) scores.push({ l: '成长', s: 80, c: 'var(--dn)', t: '营收高增长' });
  else if (f.revenueGrowth > 0.1) scores.push({ l: '成长', s: 60, c: 'var(--cy)', t: '营收稳健增长' });
  else scores.push({ l: '成长', s: 35, c: 'var(--ye)', t: '营收增长放缓' });

  else if (f.roe > 0.1) scores.push({ l: '盈利', s: 60, c: 'var(--cy)', t: 'ROE良好' });
  else scores.push({ l: '盈利', s: 30, c: 'var(--up)', t: 'ROE偏低' });

  var nr = d['当日净流入率'];
  if (nr > 0.1) scores.push({ l: '资金', s: 80, c: 'var(--dn)', t: '资金大幅流入' });
  else if (nr > 0.02) scores.push({ l: '资金', s: 60, c: 'var(--cy)', t: '资金温和流入' });
  else if (nr > -0.02) scores.push({ l: '资金', s: 45, c: 'var(--ye)', t: '资金小幅波动' });
  else scores.push({ l: '资金', s: 25, c: 'var(--up)', t: '资金明显流出' });

  var m5 = d['5日涨跌幅'];
  if (m5 > 0.1) scores.push({ l: '动量', s: 75, c: 'var(--dn)', t: '5日强势' });
  else if (m5 > 0) scores.push({ l: '动量', s: 55, c: 'var(--cy)', t: '5日偏强' });
  else scores.push({ l: '动量', s: 35, c: 'var(--up)', t: '5日偏弱' });

  if (instIn > 5e8) scores.push({ l: '机构', s: 85, c: 'var(--dn)', t: '机构大幅买入' });
  else if (instIn > 0) scores.push({ l: '机构', s: 60, c: 'var(--cy)', t: '机构小幅买入' });
  else if (instIn > -1e8) scores.push({ l: '机构', s: 40, c: 'var(--ye)', t: '机构小幅卖出' });
  else scores.push({ l: '机构', s: 20, c: 'var(--up)', t: '机构大幅卖出' });

  var total = Math.round(scores.reduce(function(a, b) { return a + b.s; }, 0) / scores.length);
  var tc = total >= 70 ? 'var(--dn)' : total >= 50 ? 'var(--cy)' : 'var(--up)';

    '</div>' +

      scores.map(function(s) {
        return '<div class="score-card"><div class="sc" style="color:' + s.c + '">' + s.s + '</div><div class="sl">' + s.l + '·' + s.t + '</div></div>';
      }).join('') +

    '<div style="font-size:8px;color:var(--tx3);margin-top:10px;text-align:center;border-top:1px solid var(--bd);padding-top:8px">' +

function toggleOpForm(code) {
  var f = document.getElementById('ops-form-' + code);
  if (f) f.classList.toggle('show');
}

function submitOpRecord(code) {
  var date = document.getElementById('op-date-' + code).value;
  var type = document.getElementById('op-type-' + code).value;
  var price = parseFloat(document.getElementById('op-price-' + code).value) || 0;
  var quantity = parseInt(document.getElementById('op-qty-' + code).value) || 0;
  var amount = parseFloat(document.getElementById('op-amt-' + code).value) || 0;
  var notes = document.getElementById('op-notes-' + code).value;
  if (!date || price <= 0) { alert('请填写日期和价格'); return; }
  var records = addRecord(code, { date: date, type: type, price: price, quantity: quantity, amount: amount, notes: notes });
  refreshOpsTable(code, records);
  toggleOpForm(code);
  document.getElementById('op-price-' + code).value = '';
  document.getElementById('op-qty-' + code).value = '';
  document.getElementById('op-amt-' + code).value = '';
  document.getElementById('op-notes-' + code).value = '';
}

function deleteOpRecord(code, id) {
  if (!confirm('确定删除此操作记录?')) return;
  var records = deleteRecord(code, id);
  refreshOpsTable(code, records);
}

function refreshOpsTable(code, records) {
  var tb = document.getElementById('ops-tbody-' + code);
  if (!tb) return;
  if (records.length === 0) {
    tb.innerHTML = '<tr><td colspan="7" class="ops-empty">暂无操作记录，点击上方按钮添加</td></tr>';
    return;
  }
  tb.innerHTML = records.map(function(r) {
    return '<tr><td>' + (r.date || '--') + '</td><td><span class="tag ' + (r.type === '买入' ? 'tag-up' : 'tag-dn') + '">' + (r.type || '--') + '</span></td><td>' + fmt(r.price) + '</td><td>' + (r.quantity || '--') + '</td><td>' + (r.amount ? fmM(r.amount) : '--') + '</td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (r.notes || '--') + '</td><td><button class="btn-sm danger" onclick="deleteOpRecord(\'' + code + '\',' + r.id + ')">删除</button></td></tr>';
  }).join('');
}

function renderPrediction(code) {
  var predictions = getPredictions(code);
  var total = predictions.length;
  var verified = predictions.filter(function(p) { return p.verified; });
  var correct = verified.filter(function(p) {
    if (p.direction === '涨' && p.actual > 0) return true;
    if (p.direction === '跌' && p.actual < 0) return true;
    if (p.direction === '平' && p.actual === 0) return true;
    return false;
  });
  var accuracy = verified.length > 0 ? Math.round(correct.length / verified.length * 100) : 0;
  var accColor = accuracy >= 70 ? 'var(--dn)' : accuracy >= 40 ? 'var(--ye)' : 'var(--up)';

  var historyRows = verified.length === 0
    ? '<div class="ops-empty">暂无已验证的预测记录</div>'
    : verified.slice(0, 10).map(function(p) {
        var isCorrect = (p.direction === '涨' && p.actual > 0) || (p.direction === '跌' && p.actual < 0) || (p.direction === '平' && p.actual === 0);
        var cls = isCorrect ? 'ph-correct' : 'ph-wrong';
        return '<div class="ph-row"><span>' + (p.date || '--') + '</span><span>预测:' + p.direction + ' ' + (p.pct ? p.pct + '%' : '') + '</span><span>实际:' + (p.actual != null ? (p.actual > 0 ? '+' : '') + p.actual + '%' : '--') + '</span><span class="' + cls + '">' + (isCorrect ? '✓正确' : '✗错误') + '</span></div>';
      }).join('');

  return '' +
    '<div class="card" style="margin-bottom:8px">' +
      '<div class="card-hd"><div class="card-hd-l"><span class="d" style="background:var(--ye);box-shadow:0 0 6px rgba(255,214,0,0.5)"></span>明日预测</div></div>' +
      '<div class="card-bd">' +
        '<div style="margin-bottom:8px">' +
          '<label style="font-size:9px;color:var(--tx3);display:block;margin-bottom:4px">预测方向</label>' +
          '<div class="pred-btns" id="pred-dir-' + code + '">' +
            '<button class="pred-btn" data-dir="涨" onclick="selectPredDir(\'' + code + '\',\'涨\')">📈 涨</button>' +
            '<button class="pred-btn" data-dir="跌" onclick="selectPredDir(\'' + code + '\',\'跌\')">📉 跌</button>' +
            '<button class="pred-btn" data-dir="平" onclick="selectPredDir(\'' + code + '\',\'平\')">📊 平</button>' +
          '</div>' +
        '</div>' +
        '<div class="form-row" style="margin-bottom:8px">' +
          '<div class="form-field"><label>预测涨跌幅(%)</label><input type="number" step="0.01" id="pred-pct-' + code + '" placeholder="例: 2.5"></div>' +
          '<div class="form-field" style="flex:2"><label>预测理由</label><input type="text" id="pred-reason-' + code + '" placeholder="预测依据..."></div>' +
        '</div>' +
        '<button class="btn btn-ac" style="width:100%;justify-content:center" onclick="submitPrediction(\'' + code + '\')">保存预测</button>' +
        '<div class="pred-history" style="margin-top:10px">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:6px">' +
            '<span style="font-size:9px;color:var(--tx3)">历史预测</span>' +
            '<span style="font-size:9px;color:var(--tx3)">准确率: <b style="font-family:var(--fm);color:' + accColor + '">' + accuracy + '%</b> (' + correct.length + '/' + verified.length + ')</span>' +
          '</div>' +
          historyRows +
          (predictions.filter(function(p) { return !p.verified; }).length > 0 ? '<div style="font-size:8px;color:var(--tx3);margin-top:4px">还有 ' + predictions.filter(function(p) { return !p.verified; }).length + ' 条预测待验证</div>' : '') +
        '</div>' +

}

var predDirCache = {};
function selectPredDir(code, dir) {
  predDirCache[code] = dir;
  var btns = document.querySelectorAll('#pred-dir-' + code + ' .pred-btn');
  btns.forEach(function(b) {
    b.classList.remove('sel-up', 'sel-dn', 'sel-flat');
    if (b.dataset.dir === dir) {
      b.classList.add('sel-' + ({ '涨': 'up', '跌': 'dn', '平': 'flat' }[dir]));
    }
  });
}

function submitPrediction(code) {
  var dir = predDirCache[code];
  if (!dir) { alert('请选择预测方向'); return; }
  var pct = parseFloat(document.getElementById('pred-pct-' + code).value) || 0;
  var reason = document.getElementById('pred-reason-' + code).value;
  var today = new Date().toISOString().slice(0, 10);
  addPrediction(code, { date: today, direction: dir, pct: pct, reason: reason });
  document.getElementById('pred-pct-' + code).value = '';
  document.getElementById('pred-reason-' + code).value = '';
  var extra = document.getElementById('extra-sections');
  if (extra) {
    var predCard = extra.querySelector('#pred-card-' + code);
    if (predCard) predCard.outerHTML = renderPrediction(code);
  }
}

function renderAdvice(ind, klData, d, f) {
  if (!ind || klData.length === 0) return '';

  var li = klData.length - 1;
  var macd = ind.macd, rsi = ind.rsi, boll = ind.boll, kdj = ind.kdj;

  var difCur = v(macd.dif[li]), deaCur = v(macd.dea[li]);
  var difPrev = v(macd.dif[li - 1]), deaPrev = v(macd.dea[li - 1]);
  var macdGolden = difPrev != null && deaPrev != null && difCur != null && deaCur != null && difPrev <= deaPrev && difCur > deaCur;
  var macdDeath = difPrev != null && deaPrev != null && difCur != null && deaCur != null && difPrev >= deaPrev && difCur < deaCur;

  var kCur = v(kdj.k[li]), dCur = v(kdj.d[li]), jCur = v(kdj.j[li]);
  var kPrev = v(kdj.k[li - 1]), dPrev = v(kdj.d[li - 1]);
  var kdjGolden = kPrev != null && dPrev != null && kCur != null && dCur != null && kPrev <= dPrev && kCur > dCur;
  var kdjDeath = kPrev != null && dPrev != null && kCur != null && dCur != null && kPrev >= dPrev && kCur < dCur;

  var rsiV = v(rsi[li]);

  var level = '', color = '', advice = '', details = [], signals = [];

  if (macdGolden && (kdjGolden || kCur < 20) && rsiV < 30) {
    level = '强烈买入信号'; color = 'var(--dn)'; advice = 'MACD金叉 + KDJ超卖/金叉 + RSI超卖，多个指标共振看涨，建议积极关注。';
    signals.push({ t: 'MACD金叉', c: 'bull' }, { t: 'KDJ超卖', c: 'bull' }, { t: 'RSI超卖', c: 'bull' });
  } else if (macdDeath && (kdjDeath || kCur > 80) && rsiV > 70) {
    level = '强烈卖出信号'; color = 'var(--up)'; advice = 'MACD死叉 + KDJ超买/死叉 + RSI超买，多个指标共振看跌，建议减仓或观望。';
    signals.push({ t: 'MACD死叉', c: 'bear' }, { t: 'KDJ超买', c: 'bear' }, { t: 'RSI超买', c: 'bear' });
  } else if (macdGolden || (kdjGolden && rsiV < 50) || (rsiV < 30 && kCur < 30)) {
    level = '买入信号'; color = 'var(--dn)'; advice = '部分指标发出买入信号，建议结合基本面综合判断。';
    if (macdGolden) { signals.push({ t: 'MACD金叉', c: 'bull' }); details.push('MACD形成金叉，短期趋势转多。'); }
    if (kdjGolden) { signals.push({ t: 'KDJ金叉', c: 'bull' }); details.push('KDJ金叉，短线反弹可期。'); }
    if (rsiV < 30) { signals.push({ t: 'RSI超卖', c: 'bull' }); details.push('RSI进入超卖区，存在反弹需求。'); }
    if (kCur < 20) { signals.push({ t: 'KDJ超卖', c: 'bull' }); details.push('K值低于20，处于超卖状态。'); }
  } else if (macdDeath || (kdjDeath && rsiV > 50) || (rsiV > 70 && kCur > 80)) {
    level = '卖出信号'; color = 'var(--up)'; advice = '部分指标发出卖出信号，建议控制仓位，注意风险。';
    if (macdDeath) { signals.push({ t: 'MACD死叉', c: 'bear' }); details.push('MACD形成死叉，短期趋势转空。'); }
    if (kdjDeath) { signals.push({ t: 'KDJ死叉', c: 'bear' }); details.push('KDJ死叉，短线面临回调压力。'); }
    if (rsiV > 70) { signals.push({ t: 'RSI超买', c: 'bear' }); details.push('RSI进入超买区，注意回调风险。'); }
    if (kCur > 80) { signals.push({ t: 'KDJ超买', c: 'bear' }); details.push('K值高于80，处于超买状态。'); }
  } else if (difCur > deaCur && rsiV > 50 && rsiV < 70) {
    level = '中性偏多'; color = 'var(--cy)'; advice = '技术指标整体偏多，但未形成强烈信号，可继续持有观察。';
    signals.push({ t: 'MACD多头', c: 'bull' }, { t: 'RSI中性偏强', c: 'neutral' });
  } else if (difCur < deaCur && rsiV < 50 && rsiV > 30) {
    level = '中性偏空'; color = 'var(--ye)'; advice = '技术指标整体偏弱，建议谨慎操作，等待明确信号。';
    signals.push({ t: 'MACD空头', c: 'bear' }, { t: 'RSI中性偏弱', c: 'neutral' });

    level = '信号不明确'; color = 'var(--tx2)'; advice = '当前各指标信号不一致，建议观望为主，等待趋势明朗。';
    signals.push({ t: '信号混乱', c: 'neutral' });
  }

  return '' +

        '</div>' +

    '</div>';
}

function v(val) { return val != null && !isNaN(val) ? val : null; }

function fetchJson(url) {
  return fetch(url).then(function(resp) { return resp.json(); });
}

function normSymbol(code) {
  var raw = String(code || '').replace('.SZ', '').replace('.SH', '');
  if (/^6/.test(raw)) return 'sh' + raw;
  if (/^[035]/.test(raw)) return 'sz' + raw;
  return 'sz' + raw;
}

function normalizeGrowthText(v) {
  if (v == null || isNaN(v)) return '--';
  return (v >= 0 ? '+' : '') + fmt(v, 2) + '%';
}

function parseAnnouncementSignals(items) {
  items = items || [];
  var text = items.map(function(it) { return String(it.title || '') + ' ' + String(it.type || ''); }).join(' | ');
  var kws = ['业绩预告', '半年度', '中报', '预增', '预减', '扭亏', '减亏', '高于', '低于'];
  return kws.filter(function(k) { return text.indexOf(k) >= 0; });
}

function buildEarningsAnalysis(code, data) {
  var q = (data.quarterly && data.quarterly.items) || [];
  var b = (data.balance && data.balance.items) || [];
  var cf = (data.cashflow && data.cashflow.items) || [];
  var ann = (data.announcements && data.announcements.items) || [];
  var fc = (data.forecast && data.forecast.forecast && data.forecast.forecast.items) || [];
  var ex = (data.forecast && data.forecast.express && data.forecast.express.items) || [];
  var rp = (data.forecast && data.forecast.report && data.forecast.report.items) || [];
  var indicators = (data.indicators && data.indicators.items) || [];

  var latest = q[0] || {};
  var annSignals = parseAnnouncementSignals(ann);

  var revYoY = latest.operateIncomeGrowth != null ? latest.operateIncomeGrowth : latest.revenueYoY;
  var npYoY = latest.parentNetProfitGrowth != null ? latest.parentNetProfitGrowth : latest.netProfitGrowth;
  var gross = latest.grossMargin;
  var roe = latest.roe;

  var ocf = cf[0] || {};
  var bs = b[0] || {};
  var cashVsProfit = (ocf.operateCashFlow != null && latest.parentNetProfit != null && latest.parentNetProfit !== 0)
    ? ocf.operateCashFlow / latest.parentNetProfit
    : null;
  var debtRatio = null;
  if (bs.totalLiabilities != null && bs.totalAssets != null && bs.totalAssets !== 0) {
    debtRatio = bs.totalLiabilities / bs.totalAssets;
  }

  // ===== Find 2026 H1 forecast / express / report =====
  var h1Forecast = null, h1Express = null, h1Report = null;
  for (var i = 0; i < fc.length; i++) {
    var item = fc[i];
    var date = item['预告日期'] || item['公告日期'] || item['数据日期'] || '';
    var type = item['预告类型'] || '';
    if (String(date).indexOf('2026') >= 0 || String(type).indexOf('2026') >= 0 || String(type).indexOf('半年度') >= 0 || String(type).indexOf('中报') >= 0) {
      h1Forecast = item; break;
    }
  }
  if (!h1Forecast && fc.length > 0) h1Forecast = fc[0];

  for (var i = 0; i < ex.length; i++) {
    var item = ex[i];
    var date = item['公告日期'] || item['业绩快报日期'] || '';
    if (String(date).indexOf('2026') >= 0) { h1Express = item; break; }
  }
  if (!h1Express && ex.length > 0) h1Express = ex[0];

  for (var i = 0; i < rp.length; i++) {
    var item = rp[i];
    var date = item['公告日期'] || item['报表期'] || '';
    if (String(date).indexOf('2026') >= 0) { h1Report = item; break; }
  }
  if (!h1Report && rp.length > 0) h1Report = rp[0];

  // ===== Parse forecast =====
  var forecastType = h1Forecast ? (h1Forecast['预告类型'] || h1Forecast['类型'] || '未知') : '暂无预告';
  var forecastRange = '', forecastReason = '';
  if (h1Forecast) {
    var change = h1Forecast['业绩变动幅度'] || h1Forecast['净利润变动幅度'] || h1Forecast['变动幅度'] || '';
    var minP = h1Forecast['预告净利润下限'] || h1Forecast['净利润下限'] || '';
    var maxP = h1Forecast['预告净利润上限'] || h1Forecast['净利润上限'] || '';
    if (change) forecastRange = String(change);
    else if (minP || maxP) forecastRange = String(minP) + ' ~ ' + String(maxP);
    forecastReason = h1Forecast['业绩变动原因'] || h1Forecast['变动原因'] || '';
  }

  var expressRev = null, expressRevYoY = null, expressNp = null, expressNpYoY = null;
  if (h1Express) {
    expressRev = h1Express['营业收入'] || h1Express['营业总收入'] || null;
    expressRevYoY = h1Express['营业收入同比增长率'] || h1Express['营收同比'] || h1Express['营业收入同比'] || null;
    expressNp = h1Express['净利润'] || h1Express['归母净利润'] || null;
    expressNpYoY = h1Express['净利润同比增长率'] || h1Express['净利同比'] || h1Express['净利润同比'] || null;
  }

  // ===== Scoring =====
  var score = 0;
  if (revYoY != null) score += revYoY > 0.15 ? 2 : revYoY > 0.05 ? 1 : -1;
  if (npYoY != null) score += npYoY > 0.2 ? 2 : npYoY > 0.08 ? 1 : -1;
  if (cashVsProfit != null) score += cashVsProfit > 1 ? 2 : cashVsProfit > 0.8 ? 1 : -1;
  if (gross != null) score += gross > 20 ? 1 : gross < 10 ? -1 : 0;
  if (debtRatio != null) score += debtRatio < 0.5 ? 1 : debtRatio > 0.7 ? -1 : 0;

  var forecastPositive = /预增|扭亏|减亏|上升|增长|大幅/.test(forecastType);
  var forecastNegative = /预减|亏损|下降|下滑|预亏/.test(forecastType);
  if (forecastPositive) score += 1;
  if (forecastNegative) score -= 1;
  if (h1Express && expressNpYoY != null) {
    score += expressNpYoY > 0.2 ? 2 : expressNpYoY > 0 ? 1 : -1;
  }
  if (annSignals.indexOf('预增') >= 0 || annSignals.indexOf('半年度') >= 0 || annSignals.indexOf('中报') >= 0) score += 1;

  // ===== Real growth quality =====
  var realGrowthQuality = '', qualityClass = '';
  if (score >= 5) { realGrowthQuality = '有真实业绩增长，现金流/利润匹配度较好，预告/快报验证度高'; qualityClass = '--up'; }
  else if (score >= 3) { realGrowthQuality = '存在真实增长，但还要看中报兑现质量，建议结合现金流和毛利率变化'; qualityClass = '--cy'; }
  else if (score >= 0) { realGrowthQuality = '增长一般，更偏主题或周期修复，需验证持续性'; qualityClass = '--ye'; }
  else { realGrowthQuality = '当前更像预期驱动，真实增长支撑不足，注意风险'; qualityClass = '--dn'; }

  // ===== Beat forecast analysis =====
  var beatProb = '未知', beatReason = '';
  if (h1Forecast && h1Express) {
    var fMin = parseFloat(h1Forecast['预告净利润下限'] || h1Forecast['净利润下限']);
    var fMax = parseFloat(h1Forecast['预告净利润上限'] || h1Forecast['净利润上限']);
    var actNp = parseFloat(h1Express['净利润'] || h1Express['归母净利润']);
    if (!isNaN(fMin) && !isNaN(actNp)) {
      if (actNp >= fMin) { beatProb = '已兑现/高于预告'; beatReason = '快报净利润' + fmM(actNp) + '，落在预告区间上方'; }
      else { beatProb = '低于预告区间'; beatReason = '快报净利润未达预告下限，关注正式中报修正'; }
    } else { beatProb = '数据不足'; beatReason = '缺少可比数值'; }
  } else if (h1Forecast && !h1Express) {
    if (score >= 5) { beatProb = '较高概率'; beatReason = '基本面扎实+预告积极，历史兑现度通常较好'; }
    else if (score >= 2) { beatProb = '中等概率'; beatReason = '预告偏积极，但需关注二季度末订单和回款'; }
    else { beatProb = '偏低概率'; beatReason = '基本面支撑不足，预告下限可能承压'; }
  } else if (h1Express) { beatProb = '已披露快报'; beatReason = '业绩快报已发布，可直接参考快报数据'; }
  else { beatProb = '待披露'; beatReason = '2026年中报/预告尚未发布，等待后续公告'; }

  // ===== H2 trend prediction =====
  var trendDir = '', trendDetail = '';
  var actualNpYoY = expressNpYoY || (h1Report ? (h1Report['净利润同比增长率'] || h1Report['净利同比']) : null);
  if (actualNpYoY != null) {
    if (actualNpYoY > 0.3) { trendDir = 'H2有望延续高增长'; trendDetail = '上半年净利同比+' + (actualNpYoY*100).toFixed(1) + '%，若下游需求不逆转，全年高增长确定性较高'; }
    else if (actualNpYoY > 0.1) { trendDir = 'H2温和增长'; trendDetail = '上半年净利同比+' + (actualNpYoY*100).toFixed(1) + '%，下半年关注旺季/订单爬坡能否加速'; }
    else if (actualNpYoY > 0) { trendDir = 'H2分化修复'; trendDetail = '上半年微增，下半年取决于行业景气度和公司订单节奏'; }
    else { trendDir = 'H2承压'; trendDetail = '上半年同比下滑，下半年若不能扭转，全年业绩存在下修风险'; }
  } else if (h1Forecast) {
    if (forecastPositive) { trendDir = 'H2大概率向好'; trendDetail = '预告偏积极，若上半年趋势延续，下半年有望保持'; }
    else if (forecastNegative) { trendDir = 'H2谨慎'; trendDetail = '预告偏负面，下半年需观察是否有边际改善信号'; }
    else { trendDir = 'H2中性'; trendDetail = '预告信号不明确，等待更多数据验证'; }
  } else { trendDir = '待披露'; trendDetail = '2026年中报/预告尚未发布，建议关注后续公告'; }

  var direction = score >= 4 ? '高增长延续' : score >= 2 ? '温和增长' : score >= 0 ? '分化修复' : '增长承压';

  var coreItems = [];
  if (latest.reportDate) coreItems.push('最新报表期: ' + latest.reportDate);
  if (revYoY != null) coreItems.push('营收同比: ' + normalizeGrowthText(revYoY));
  if (npYoY != null) coreItems.push('归母净利同比: ' + normalizeGrowthText(npYoY));
  if (gross != null) coreItems.push('毛利率: ' + fmt(gross, 2) + '%');
  if (roe != null) coreItems.push('ROE: ' + fmt(roe, 2) + '%');
  if (cashVsProfit != null) coreItems.push('经营现金流/净利: ' + fmt(cashVsProfit, 2) + 'x');
  if (debtRatio != null) coreItems.push('资产负债率: ' + fmt(debtRatio * 100, 1) + '%');

  var forecastItems = [];
  if (h1Forecast) {
    forecastItems.push('预告类型: ' + forecastType);
    if (forecastRange) forecastItems.push('变动幅度: ' + forecastRange);
    if (forecastReason) forecastItems.push('变动原因: ' + forecastReason.substring(0, 80) + (forecastReason.length > 80 ? '...' : ''));
  } else { forecastItems.push('暂无2026年中期业绩预告'); }
  if (h1Express) {
    if (expressRev != null) forecastItems.push('快报营收: ' + fmM(expressRev));
    if (expressRevYoY != null) forecastItems.push('快报营收同比: ' + normalizeGrowthText(expressRevYoY));
    if (expressNp != null) forecastItems.push('快报净利润: ' + fmM(expressNp));
    if (expressNpYoY != null) forecastItems.push('快报净利同比: ' + normalizeGrowthText(expressNpYoY));
  }
  if (h1Report) {
    var rRev = h1Report['营业收入'] || h1Report['营业总收入'] || null;
    var rNp = h1Report['净利润'] || h1Report['归母净利润'] || null;
    if (rRev != null) forecastItems.push('报表营收: ' + fmM(rRev));
    if (rNp != null) forecastItems.push('报表净利润: ' + fmM(rNp));
  }

  var risk = [];
  if (npYoY != null && npYoY < 0) risk.push('利润同比转弱');
  if (cashVsProfit != null && cashVsProfit < 0.8) risk.push('现金流弱于利润');
  if (debtRatio != null && debtRatio > 0.7) risk.push('杠杆偏高');
  if (annSignals.length === 0 && !h1Forecast) risk.push('缺少明确中报/预告线索');
  if (forecastNegative) risk.push('业绩预告偏负面(' + forecastType + ')');

  var sources = [];
  if (h1Forecast) sources.push('东方财富-预报');
  if (h1Express) sources.push('东方财富-快报');
  if (h1Report) sources.push('东方财富-报表');
  if (indicators.length) sources.push('AKShare-财务');
  if (ann.length) sources.push('公告');

  return '' +
    '<div class="card" style="margin-bottom:8px">' +
      '<div class="card-hd"><div class="card-hd-l"><span class="d" style="background:var(--cy);box-shadow:0 0 6px rgba(0,229,255,0.5)"></span>2026中报与业绩预告深度分析</div><span style="font-size:9px;color:var(--tx3)">多源: ' + (sources.join('+') || '本地分析') + '</span></div>' +
      '<div class="card-bd">' +
        '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">' +
          '<div style="flex:1;min-width:140px;background:var(--bg);border-radius:var(--r);padding:8px 10px;text-align:center;border:1px solid var(--bd)">' +
            '<div style="font-size:9px;color:var(--tx3);margin-bottom:4px">业绩方向</div>' +
            '<div style="font-family:var(--fm);font-size:16px;font-weight:700;color:' + (score >= 4 ? 'var(--up)' : score >= 2 ? 'var(--cy)' : score >= 0 ? 'var(--ye)' : 'var(--dn)') + '">' + direction + '</div>' +
          '</div>' +
          '<div style="flex:1;min-width:140px;background:var(--bg);border-radius:var(--r);padding:8px 10px;text-align:center;border:1px solid var(--bd)">' +
            '<div style="font-size:9px;color:var(--tx3);margin-bottom:4px">真实增长质量</div>' +
            '<div style="font-family:var(--fm);font-size:14px;font-weight:700;color:var(' + qualityClass + ')">' + (score >= 5 ? '优' : score >= 3 ? '良' : score >= 0 ? '中' : '弱') + '</div>' +
            '<div style="font-size:8px;color:var(--tx3);margin-top:2px;line-height:1.4">' + realGrowthQuality + '</div>' +
          '</div>' +
          '<div style="flex:1;min-width:140px;background:var(--bg);border-radius:var(--r);padding:8px 10px;text-align:center;border:1px solid var(--bd)">' +
            '<div style="font-size:9px;color:var(--tx3);margin-bottom:4px">能否高于预测</div>' +
            '<div style="font-family:var(--fm);font-size:14px;font-weight:700;color:' + (beatProb.indexOf('高') >= 0 || beatProb.indexOf('已兑现') >= 0 ? 'var(--up)' : beatProb.indexOf('中') >= 0 ? 'var(--cy)' : 'var(--dn)') + '">' + beatProb + '</div>' +
            '<div style="font-size:8px;color:var(--tx3);margin-top:2px;line-height:1.4">' + beatReason + '</div>' +
          '</div>' +
          '<div style="flex:1;min-width:140px;background:var(--bg);border-radius:var(--r);padding:8px 10px;text-align:center;border:1px solid var(--bd)">' +
            '<div style="font-size:9px;color:var(--tx3);margin-bottom:4px">H2趋势预测</div>' +
            '<div style="font-family:var(--fm);font-size:14px;font-weight:700;color:' + (trendDir.indexOf('向好') >= 0 || trendDir.indexOf('延续') >= 0 ? 'var(--up)' : trendDir.indexOf('承压') >= 0 ? 'var(--dn)' : 'var(--cy)') + '">' + trendDir + '</div>' +
            '<div style="font-size:8px;color:var(--tx3);margin-top:2px;line-height:1.4">' + trendDetail + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="analysis-grid">' +
          '<div class="analysis-card">' +
            '<h4>核心财务指标</h4>' +
            '<ul>' + coreItems.map(function(it) { return '<li>' + it + '</li>'; }).join('') + '</ul>' +
          '</div>' +
          '<div class="analysis-card">' +
            '<h4>2026中期业绩预报/快报</h4>' +
            '<ul>' + forecastItems.map(function(it) { return '<li>' + it + '</li>'; }).join('') + '</ul>' +
          '</div>' +
        '</div>' +
        '<div class="analysis-grid" style="margin-top:8px">' +
          '<div class="analysis-card">' +
            '<h4>公告线索</h4>' +
            '<p>' + (annSignals.length ? annSignals.join('，') : '暂未抓到明确公告信号') + '</p>' +
            (h1Forecast ? '<p style="margin-top:6px;font-size:9px;color:var(--tx3)">预告日期: ' + (h1Forecast['预告日期'] || h1Forecast['公告日期'] || '--') + '</p>' : '') +
          '</div>' +
          '<div class="analysis-card">' +
            '<h4>主要风险</h4>' +
            '<ul>' + (risk.length ? risk.map(function(it) { return '<li>' + it + '</li>'; }).join('') : '<li>暂无明显风险信号</li>') + '</ul>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

function loadEarningsSection(code) {
  var box = document.getElementById('earnings-card-' + code);
  if (!box) return;
  var symbol = normSymbol(code);
  fetchJson('/api/fundamental/comprehensive?symbol=' + encodeURIComponent(symbol))
    .then(function(data) {
      box.outerHTML = buildEarningsAnalysis(code, data);
    }).catch(function() {
      box.outerHTML = '<div class="card" style="margin-bottom:8px"><div class="card-bd"><div style="text-align:center;padding:16px;color:var(--tx3);font-size:10px">业绩分析加载失败，请稍后重试</div></div></div>';
    });
}

// ============================================================
// 异步加载额外section（技术指标、回撤、操作记录、预测、操作建议）
// ============================================================
function loadExtraSections(code, d, f) {
  var extra = document.getElementById('extra-sections');
  if (!extra) return;

  var symbol = code.replace('.SZ', '').replace('.SH', '');
  if (code.indexOf('.SZ') >= 0) symbol = 'sz' + symbol;
  else if (code.indexOf('.SH') >= 0) symbol = 'sh' + symbol;
  else symbol = 'sz' + symbol;

  fetchKline(symbol, 240, 60).then(function(klData) {
    var ind = null;
    if (klData.length > 0) {
      ind = calcAll(klData);
    }
    extra.innerHTML = '' +
      '<div id="earnings-card-' + code + '"><div class="card" style="margin-bottom:8px"><div class="card-bd"><div style="text-align:center;padding:16px;color:var(--tx3);font-size:10px">2026中报与业绩预告分析加载中...</div></div></div></div>' +
      '<div id="tech-card-' + code + '">' + renderTechIndicators(ind, klData) + '</div>' +
      renderDrawdown(d) +
      '<div id="ops-card-' + code + '">' + renderOperations(code) + '</div>' +
      '<div id="pred-card-' + code + '">' + renderPrediction(code) + '</div>' +
      '<div id="advice-card-' + code + '">' + renderAdvice(ind, klData, d, f) + '</div>';
    loadEarningsSection(code);
  }).catch(function() {
    extra.innerHTML = '<div style="text-align:center;padding:16px;color:var(--tx3);font-size:10px">数据加载失败，请稍后重试</div>';
  });
}

          '<div style="background:var(--bg);border-radius:var(--r);padding:6px 8px">' +
            '<div style="font-size:9px;color:var(--tx3);margin-bottom:4px">▸ 催化剂</div>' +
            '<div style="font-size:9px;margin-bottom:3px"><span style="color:var(--cy)">短期:</span> <span style="color:var(--tx2)">' + il.catalysts.short + '</span></div>' +
            '<div style="font-size:9px;margin-bottom:3px"><span style="color:var(--bl)">中期:</span> <span style="color:var(--tx2)">' + il.catalysts.mid + '</span></div>' +
            '<div style="font-size:9px"><span style="color:var(--pu)">长期:</span> <span style="color:var(--tx2)">' + il.catalysts.long + '</span></div>' +
          '</div>' +
          '<div style="background:var(--bg);border-radius:var(--r);padding:6px 8px">' +
            '<div style="font-size:9px;color:var(--tx3);margin-bottom:4px">▸ 风险提示</div>' +
            il.risks.map(function(r) { return '<div style="font-size:9px;color:var(--up);margin-bottom:3px">⚠ ' + r + '</div>'; }).join('') +
          '</div>' +
        '</div>' +
        '<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;margin-bottom:8px">' +
          '<div style="font-size:9px;color:var(--ac);font-weight:600;margin-bottom:5px">▸ 事件节点</div>' +
          (il.events && il.events.length ? il.events.map(function(ev, i) { return '<div style="font-size:9px;color:var(--tx2);line-height:1.7">' + (i + 1) + '. ' + ev + '</div>'; }).join('') :
          '<div style="font-size:9px;color:var(--tx2);line-height:1.7">1. 短期关注：' + il.catalysts.short + '</div>' +
          '<div style="font-size:9px;color:var(--tx2);line-height:1.7">2. 中期跟踪：' + il.catalysts.mid + '</div>' +
          '<div style="font-size:9px;color:var(--tx2);line-height:1.7">3. 长期验证：' + il.catalysts.long + '</div>') +
        '</div>' +
      '</div>' +
    '</div>' : '') +
    '<!-- 财务数据分析 -->' +
    '<div class="card" style="margin-bottom:8px">' +
      '<div class="card-hd"><div class="card-hd-l"><span class="d" style="background:var(--bl);box-shadow:0 0 6px rgba(41,121,255,0.5)"></span>财务数据分析</div><span style="font-size:9px;color:var(--tx3)">动态多源 · 东方财富+新浪财经+同花顺</span></div>' +
      '<div class="card-bd">' +
        '<div class="fin-grid">' +
          '<div class="fin-card"><div class="fl">市盈率(PE)</div><div class="fv">' + fmt(f.pe, 1) + '</div><div class="fs">' + (f.pe < 20 ? '估值偏低' : f.pe < 40 ? '估值合理' : '估值偏高') + '</div></div>' +
          '<div class="fin-card"><div class="fl">市净率(PB)</div><div class="fv">' + fmt(f.pb, 1) + '</div><div class="fs">' + (f.pb < 3 ? '破净边缘' : f.pb < 6 ? '正常水平' : '溢价较高') + '</div></div>' +
          '<div class="fin-card"><div class="fl">ROE</div><div class="fv">' + fmt(f.roe * 100, 1) + '%</div><div class="fs">' + (f.roe > 0.2 ? '优秀' : f.roe > 0.1 ? '良好' : '一般') + '</div></div>' +
          '<div class="fin-card"><div class="fl">营收</div><div class="fv" style="font-size:11px">' + fmM(f.revenue) + '</div><div class="fs ' + cClass(f.revenueGrowth) + '">同比 ' + fmP(f.revenueGrowth) + '</div></div>' +
          '<div class="fin-card"><div class="fl">净利润</div><div class="fv" style="font-size:11px">' + fmM(f.netProfit) + '</div><div class="fs ' + cClass(f.profitGrowth) + '">同比 ' + fmP(f.profitGrowth) + '</div></div>' +
          '<div class="fin-card"><div class="fl">总市值</div><div class="fv" style="font-size:11px">' + fmM(f.marketCap) + '</div><div class="fs">流通市值</div></div>' +
          '<div class="fin-card"><div class="fl">资产负债率</div><div class="fv">' + fmt(f.debtRatio * 100, 1) + '%</div><div class="fs">' + (f.debtRatio < 0.4 ? '低杠杆' : f.debtRatio < 0.6 ? '中等杠杆' : '高杠杆') + '</div></div>' +
          '<div class="fin-card"><div class="fl">经营现金流</div><div class="fv" style="font-size:11px">' + fmM(f.cashFlow) + '</div><div class="fs">' + (f.cashFlow > f.netProfit * 0.8 ? '现金流健康' : '需关注') + '</div></div>' +
          '<div class="fin-card"><div class="fl">当日净流入率</div><div class="fv ' + cClass(d['当日净流入率']) + '">' + fmt(d['当日净流入率'] * 100, 2) + '%</div><div class="fs">当日资金态度</div></div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<!-- 综合评估 -->' +
    '<div class="card" style="margin-bottom:8px">' +
      '<div class="card-hd"><div class="card-hd-l"><span class="d" style="background:var(--ye);box-shadow:0 0 6px rgba(255,214,0,0.5)"></span>综合评估</div></div>' +
      '<div class="card-bd">' +
        renderScore(code, d, f) +
      '</div>' +
    '</div>' +
    '<div id="extra-sections"><div style="text-align:center;padding:16px;color:var(--tx3);font-size:10px">加载技术指标...</div></div>';

  // 异步加载额外section
  loadExtraSections(code, d, f);
}

// ============================================================
// 自定义股票管理
// ============================================================
function getCustomStocks() {
  try { var v = localStorage.getItem('sa_custom_stocks'); return v ? JSON.parse(v) : []; } catch (e) { return []; }
}
function saveCustomStocks(stocks) {
  try { localStorage.setItem('sa_custom_stocks', JSON.stringify(stocks)); } catch (e) {}
}
function getAllStockCodes() {
  var custom = getCustomStocks();
  return STOCK_CODES.concat(custom.map(function(s) { return s.code; }));
}
function addCustomStock() {
  var input = document.getElementById('custom-stock-code');
  var raw = input.value.trim();
  if (!raw || raw.length !== 6 || !/^\d{6}$/.test(raw)) { alert('请输入6位数字股票代码'); return; }
  var prefix = raw.charAt(0);
  var suffix = (prefix === '6') ? '.SH' : '.SZ';
  var code = raw + suffix;
  var exist = getAllStockCodes();
  if (exist.indexOf(code) >= 0) { alert('该股票已存在'); return; }
  var name = prompt('请输入股票名称:');
  if (!name || !name.trim()) return;
  var sector = prompt('请输入板块(如: 消费电子):');
  if (!sector || !sector.trim()) sector = '--';
  var intro = prompt('请输入简介:');
  if (!intro || !intro.trim()) intro = '--';
  var custom = getCustomStocks();
  custom.push({ code: code, name: name.trim(), sector: sector.trim(), intro: intro.trim() });
  saveCustomStocks(custom);
  // 自动生成占位数据
  if (!BUSINESS[code]) { BUSINESS[code] = { name: name.trim(), sector: sector.trim(), sub: '--', intro: intro.trim(), products: ['--'], advantages: ['--'] }; }
  if (!FINANCE[code]) { FINANCE[code] = { pe: 0, pb: 0, roe: 0, revenue: 0, netProfit: 0, revenueGrowth: 0, profitGrowth: 0, debtRatio: 0, cashFlow: 0, marketCap: 0 }; }
  if (!FINANCE_BRIEF[code]) { FINANCE_BRIEF[code] = { name: name.trim(), code: code, items: ['财报数据待补充'], conclusion: '自定义添加个股，数据待完善' }; }
  if (!INDUSTRY_LOGIC[code]) { INDUSTRY_LOGIC[code] = { summary: '自定义添加个股，产业逻辑待分析', logic: ['待补充'], catalysts: { short: '--', mid: '--', long: '--' }, risks: ['待分析'] }; }
  input.value = '';
  refreshTabs();
  state.activeCode = code;
  renderStock();
}
function deleteCustomStock(code) {
  if (!confirm('确定删除该个股?')) return;
  var custom = getCustomStocks();
  custom = custom.filter(function(s) { return s.code !== code; });
  saveCustomStocks(custom);
  delete BUSINESS[code];
  delete FINANCE[code];
  delete FINANCE_BRIEF[code];
  delete INDUSTRY_LOGIC[code];
  if (state.activeCode === code) { state.activeCode = STOCK_CODES[0]; }
  refreshTabs();
  renderStock();
}
function refreshTabs() {
  var codes = getAllStockCodes();
  var tc = document.getElementById('stock-tabs');
  var custom = getCustomStocks();
  var customCodes = custom.map(function(s) { return s.code; });
  tc.innerHTML = codes.map(function(c) {
    var name = STOCK_DATA[c] ? STOCK_DATA[c]['简称'] : BUSINESS[c] ? BUSINESS[c].name : c;
    var act = c === state.activeCode ? 'act' : '';
    var codeDisplay = c.replace('.SZ', '').replace('.SH', '');
    var delBtn = customCodes.indexOf(c) >= 0 ? '<span class="tab-del" data-del="' + c + '">×</span>' : '';
    return '<button class="tab ' + act + '" data-code="' + c + '">' + name + '<span style="font-size:9px;color:var(--tx3);margin-left:4px">' + codeDisplay + '</span>' + delBtn + '</button>';
  }).join('');
}

// ============================================================
// 初始化
// ============================================================
function init() {
  ensureStaticProfilesFromStockData();
  state.activeCode = STOCK_CODES[0];

  refreshTabs();

  var tc = document.getElementById('stock-tabs');
  tc.addEventListener('click', function(e) {
    var del = e.target.closest('.tab-del');
    if (del) { e.stopPropagation(); deleteCustomStock(del.dataset.del); return; }
    var btn = e.target.closest('.tab');
    if (!btn) return;
    state.activeCode = btn.dataset.code;
    document.querySelectorAll('#stock-tabs .tab').forEach(function(t) { t.classList.remove('act'); });
    btn.classList.add('act');
    renderStock();
  });

  renderStock();
}

init();
</script>
