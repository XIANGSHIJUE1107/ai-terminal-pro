<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本地安全页</title>
<style>
body{margin:0;background:#081018;color:#d7e0ea;font-family:Arial,"Microsoft YaHei",sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:16px}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
input,button{background:#102030;color:#d7e0ea;border:1px solid #203248;border-radius:4px;padding:8px 10px;font-size:14px}
button{cursor:pointer}
.card{border:1px solid #1c2d40;background:#0d1722;border-radius:6px;padding:12px;margin-bottom:12px}
.hd{font-weight:700;color:#7fd1ff;margin-bottom:8px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.k{color:#8aa0b7}
.v{color:#f4f8fc;font-weight:700}
pre{white-space:pre-wrap;word-break:break-word;margin:0;color:#bfd2e6}
.ok{color:#4ade80}.bad{color:#f87171}.muted{color:#7b8ca3}
a{color:#7fd1ff;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <input id="sym" value="sh000001" autocomplete="off" spellcheck="false">
    <button id="refresh">刷新</button>
    <a href="/terminal.html">打开终端页</a>
  </div>

  <div class="card">
    <div class="hd">服务状态</div>
    <pre id="health" class="muted">加载中...</pre>
  </div>

  <div class="card">
    <div class="hd">实时行情</div>
    <div class="row" id="quote"></div>
  </div>

  <div class="card">
    <div class="hd">K线</div>
    <pre id="kline" class="muted">加载中...</pre>
  </div>

  <div class="card">
    <div class="hd">日志</div>
    <pre id="log" class="muted">等待刷新...</pre>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>n==null||isNaN(n)?'--':Number(n).toFixed(2);
const pct=n=>n==null||isNaN(n)?'--':(Number(n)>=0?'+':'')+Number(n).toFixed(2)+'%';
function timeout(ms){const c=new AbortController();setTimeout(()=>c.abort(),ms);return c.signal;}
async function getJson(url){
  const r=await fetch(url,{signal:timeout(12000)});
  const t=await r.text();
  return {ok:r.ok,status:r.status,text:t,json:()=>{try{return JSON.parse(t)}catch(e){return null}}};
}
function renderHealth(data){
  $('health').innerHTML=`状态: <span class="${data && data.status==='ok'?'ok':'bad'}">${data && data.status ? data.status : 'unknown'}</span>\n`+
    JSON.stringify(data,null,2);
}
function renderQuote(data,sym){
  const q=data?.[sym] || data?.items?.[sym] || data?.data?.quotes?.[sym] || data?.quotes?.[sym] || null;
  if(!q){$('quote').innerHTML='<span class="bad">没有拿到行情</span>';return;}
  const cur=fmt(q.current), chg=pct(q.changePct!=null?q.changePct:q.change), amt=q.amount!=null?q.amount:'--';
  $('quote').innerHTML=`<div><div class="k">代码</div><div class="v">${sym}</div></div>
    <div><div class="k">名称</div><div class="v">${q.name||'--'}</div></div>
    <div><div class="k">现价</div><div class="v">${cur}</div></div>
    <div><div class="k">涨跌幅</div><div class="v">${chg}</div></div>
    <div><div class="k">成交额</div><div class="v">${amt}</div></div>`;
}
function renderKline(data){
  const items=data?.items || data?.data || [];
  if(!Array.isArray(items) || items.length===0){$('kline').textContent='没有K线数据';return;}
  const last=items[items.length-1];
  $('kline').textContent=JSON.stringify({count:items.length,last},null,2);
}
async function refresh(){
  const sym=($('sym').value||'sh000001').trim();
  $('log').textContent='刷新中...';
  try{
    const [h,q,k] = await Promise.all([
      getJson('/api/health'),
      getJson('/api/quote?symbols='+encodeURIComponent(sym)),
      getJson('/api/kline?symbol='+encodeURIComponent(sym)+'&scale=240&length=20')
    ]);
    renderHealth(h.json());
    renderQuote(q.json(), sym);
    renderKline(k.json());
    $('log').textContent=`health:${h.status} quote:${q.status} kline:${k.status}\n${new Date().toLocaleString()}`;
  }catch(e){
    $('log').textContent='刷新失败: '+e.message;
    $('health').textContent='服务不可用';
    $('quote').innerHTML='<span class="bad">无法连接接口</span>';
    $('kline').textContent='无法连接接口';
  }
}
$('refresh').addEventListener('click', refresh);
setInterval(refresh,15000);
refresh();
</script>
</body>
</html>
